[kubernetes]
style = "bg:lavender"
format = '[[ $symbol($context) ](fg:base bg:lavender)]($style)'
disabled = false

[[kubernetes.contexts]]
context_pattern = ".*origin-prod.*"
context_alias = "origin-prod"
